<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatchClicker — Translation Review</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1C1C1E;
    --bg2: #2C2C2E;
    --bg3: #3A3A3C;
    --surface: #242426;
    --green: #ADD144;
    --green-dim: rgba(173,209,68,0.12);
    --green-mid: rgba(173,209,68,0.25);
    --text: #F5F5F7;
    --text-dim: #8E8E93;
    --text-dimmer: #48484A;
    --border: #3A3A3C;
    --border-focus: #ADD144;
    --changed: rgba(173,209,68,0.15);
    --changed-border: #ADD144;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--green); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .changes-badge {
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    font-weight: 500;
    display: none;
  }
  .changes-badge.visible { display: inline-block; }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }

  .toolbar-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  .lang-select {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    min-width: 160px;
  }
  .lang-select:focus { border-color: var(--border-focus); }

  .search-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 240px;
  }
  .search-box::placeholder { color: var(--text-dimmer); }
  .search-box:focus { border-color: var(--border-focus); }

  .filter-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border-focus); color: var(--text); }
  .filter-btn.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }

  .spacer { flex: 1; }

  .submit-btn {
    background: var(--green);
    color: #111;
    border: none;
    padding: 9px 24px;
    border-radius: var(--radius);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .submit-btn:hover { background: #c0e053; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── LOADING ── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 16px;
    color: var(--text-dim);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TABLE ── */
  #table-wrap {
    padding: 0 32px 120px;
    display: none;
  }

  .col-headers {
    display: grid;
    gap: 0;
    padding: 10px 0 8px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 60px;
    background: var(--bg);
    z-index: 50;
  }

  .col-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding: 0 8px;
  }
  .col-header.selected-lang { color: var(--green); }

  .row {
    display: grid;
    gap: 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    align-items: start;
  }
  .row:hover { background: rgba(255,255,255,0.02); }
  .row.changed { background: var(--changed); }

  .cell {
    padding: 10px 8px;
    line-height: 1.5;
    word-break: break-word;
  }

  .cell-key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dimmer);
    padding-top: 12px;
  }

  .cell-en {
    color: var(--text);
    font-size: 13px;
  }

  .cell-selected {
    padding: 6px 6px;
  }

  .cell-edit {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    width: 100%;
    min-height: 36px;
    padding: 6px 8px;
    border-radius: 6px;
    resize: none;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }
  .cell-edit:hover { border-color: var(--border); }
  .cell-edit:focus { border-color: var(--border-focus); background: var(--bg2); }
  .cell-edit.is-changed {
    border-color: var(--changed-border) !important;
    background: var(--changed) !important;
    color: var(--green) !important;
  }

  .cell-others {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 8px 8px;
  }

  .other-lang {
    display: flex;
    gap: 6px;
    align-items: baseline;
  }
  .other-lang-code {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    min-width: 24px;
    flex-shrink: 0;
  }
  .other-lang-val {
    font-size: 12px;
    color: var(--text-dimmer);
    line-height: 1.4;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: var(--radius);
    font-size: 14px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: #EA523E; color: #EA523E; }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-dim);
  }

  /* ── PROGRESS ── */
  .progress-bar {
    height: 2px;
    background: var(--border);
    margin: 0 32px;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.3s ease;
  }

  .stats-row {
    padding: 8px 32px;
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  .stats-row span { color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="logo">#<span>CatchClicker</span> Translations</div>
  <div class="header-right">
    <div class="changes-badge" id="changesBadge">0 changes</div>
    <button class="submit-btn" id="submitBtn" disabled onclick="submitChanges()">Submit Changes</button>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Review language</span>
  <select class="lang-select" id="langSelect" onchange="onLangChange()">
    <option value="">— select —</option>
    <option value="FR">🇫🇷 French</option>
    <option value="DE">🇩🇪 German</option>
    <option value="IT">🇮🇹 Italian</option>
    <option value="ES">🇪🇸 Spanish</option>
    <option value="NL">🇳🇱 Dutch</option>
    <option value="PL">🇵🇱 Polish</option>
    <option value="CS">🇨🇿 Czech</option>
    <option value="HU">🇭🇺 Hungarian</option>
    <option value="RO">🇷🇴 Romanian</option>
    <option value="GE">🇬🇪 Georgian</option>
    <option value="RU">🇷🇺 Russian</option>
  </select>

  <input class="search-box" id="searchBox" placeholder="Search keys or values..." oninput="renderRows()" />

  <button class="filter-btn" id="filterChanged" onclick="toggleFilter()" title="Show only changed rows">
    Changed only
  </button>

  <div class="spacer"></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="stats-row" id="statsRow" style="display:none">
  Showing <span id="statVisible">0</span> / <span id="statTotal">0</span> strings &nbsp;·&nbsp;
  Changed: <span id="statChanged">0</span>
</div>

<div id="loading"><div class="spinner"></div><div>Loading translations...</div></div>
<div id="table-wrap">
  <div class="col-headers" id="colHeaders"></div>
  <div id="rowsContainer"></div>
  <div class="empty-state" id="emptyState" style="display:none">No strings match your search.</div>
</div>

<div id="toast"></div>

<script>
const SHEET_ID = '1VA-n4Jv4APtf0tbjEiXEkjKSHnPS9J5fPP9cw_7ZpA8';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBfUICUYZdA5ANUBanZZ2--MJG3cHGdtY2bdwRufr3_MRzdWYqsic0Ylds1Icl7QwFkA/exec';

const ALL_LANGS = ['EN','FR','DE','IT','ES','NL','PL','CS','HU','RO','GE','RU'];

let allRows = [];      // [{key, EN, FR, DE, ...}]
let headers = [];      // column names from sheet
let selectedLang = '';
let changes = {};      // {key: newValue}
let showChangedOnly = false;


// ── LOAD DATA via JSONP (bypasses CORS) ──
function loadSheet() {
  window._onSheetData = function(data) {
    if (data.status !== 'ok') {
      document.getElementById('loading').innerHTML = '<div style="color:#EA523E">Failed to load: ' + (data.message||'error') + '</div>';
      return;
    }
    headers = data.headers;
    allRows = data.rows.filter(r => r.key);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('statTotal').textContent = allRows.length;
  };
  const s = document.createElement('script');
  s.onerror = () => { document.getElementById('loading').innerHTML = '<div style="color:#EA523E">Failed to load sheet</div>'; };
  s.src = APPS_SCRIPT_URL + '?action=getSheetData&callback=_onSheetData';
  document.head.appendChild(s);
}

// ── LANG CHANGE ──
function onLangChange() {
  selectedLang = document.getElementById('langSelect').value;
  changes = {};
  updateBadge();
  if (!selectedLang) return;

  document.getElementById('table-wrap').style.display = 'block';
  document.getElementById('statsRow').style.display = 'flex';
  renderHeaders();
  renderRows();
}

function renderHeaders() {
  const others = ALL_LANGS.filter(l => l !== 'EN' && l !== selectedLang);
  const el = document.getElementById('colHeaders');
  el.style.gridTemplateColumns = `160px 1fr 1fr 1fr`;
  el.innerHTML = `
    <div class="col-header">Key</div>
    <div class="col-header">English (source)</div>
    <div class="col-header selected-lang">${selectedLang} — your translation</div>
    <div class="col-header">Other languages</div>
  `;
}

function renderRows() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const container = document.getElementById('rowsContainer');
  container.innerHTML = '';

  const others = ALL_LANGS.filter(l => l !== 'EN' && l !== selectedLang);

  let visible = 0;
  allRows.forEach(row => {
    const key = row.key || '';
    const en = String(row['EN'] || '');
    const sel = String(row[selectedLang] || '');
    const currentVal = changes[key] !== undefined ? changes[key] : sel;
    const isChanged = changes[key] !== undefined && changes[key] !== sel;

    if (showChangedOnly && !isChanged) return;
    if (search && !key.toLowerCase().includes(search) && !en.toLowerCase().includes(search) && !sel.toLowerCase().includes(search)) return;

    visible++;

    const rowEl = document.createElement('div');
    rowEl.className = 'row' + (isChanged ? ' changed' : '');
    rowEl.style.gridTemplateColumns = '160px 1fr 1fr 1fr';
    rowEl.dataset.key = key;

    // others html
    const othersHtml = others.map(l => {
      const v = String(row[l] || '');
      if (!v) return '';
      return `<div class="other-lang"><span class="other-lang-code">${l}</span><span class="other-lang-val">${escHtml(v)}</span></div>`;
    }).join('');

    rowEl.innerHTML = `
      <div class="cell cell-key">${escHtml(key)}</div>
      <div class="cell cell-en">${escHtml(en)}</div>
      <div class="cell cell-selected">
        <textarea class="cell-edit${isChanged ? ' is-changed' : ''}"
          rows="2"
          data-key="${escHtml(key)}"
          data-original="${escHtml(sel)}"
        >${escHtml(currentVal)}</textarea>
      </div>
      <div class="cell cell-others">${othersHtml}</div>
    `;

    container.appendChild(rowEl);
  });

  // Auto-resize textareas and attach listeners
  container.querySelectorAll('.cell-edit').forEach(ta => {
    autoResize(ta);
    ta.addEventListener('input', onEdit);
    ta.addEventListener('input', () => autoResize(ta));
  });

  document.getElementById('statVisible').textContent = visible;
  document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(36, el.scrollHeight) + 'px';
}

function onEdit(e) {
  const ta = e.target;
  const key = ta.dataset.key;
  const original = ta.dataset.original;
  const newVal = ta.value;

  if (newVal !== original) {
    changes[key] = newVal;
    ta.classList.add('is-changed');
    ta.closest('.row').classList.add('changed');
  } else {
    delete changes[key];
    ta.classList.remove('is-changed');
    ta.closest('.row').classList.remove('changed');
  }
  updateBadge();
}

function updateBadge() {
  const count = Object.keys(changes).length;
  const badge = document.getElementById('changesBadge');
  const btn = document.getElementById('submitBtn');
  badge.textContent = `${count} change${count !== 1 ? 's' : ''}`;
  badge.classList.toggle('visible', count > 0);
  btn.disabled = count === 0;
  document.getElementById('statChanged').textContent = count;
  document.getElementById('progressFill').style.width = allRows.length ? `${(count/allRows.length)*100}%` : '0%';
}

function toggleFilter() {
  showChangedOnly = !showChangedOnly;
  document.getElementById('filterChanged').classList.toggle('active', showChangedOnly);
  renderRows();
}

// ── SUBMIT ──
async function submitChanges() {
  const count = Object.keys(changes).length;
  if (count === 0) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const payload = {
    action: 'submitTranslationReview',
    lang: selectedLang,
    reviewer: 'giga_gabriadze',
    changes: Object.entries(changes).map(([key, value]) => ({ key, value }))
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.status === 'ok') {
      showToast(`✓ ${count} changes submitted to sheet [${selectedLang}]_giga_gabriadze`, 'success');
      // Mark submitted changes as new originals
      Object.entries(changes).forEach(([key, val]) => {
        const row = allRows.find(r => r.key === key);
        if (row) row[selectedLang] = val;
      });
      changes = {};
      updateBadge();
      renderRows();
    } else {
      throw new Error(data.message || 'Unknown error');
    }
  } catch(e) {
    showToast(`Error: ${e.message}`, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Submit Changes';
}

// ── UTILS ──
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ── INIT ──
loadSheet();
</script>
</body>
</html>
