<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatchClicker — Translation Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #1C1C1E;
    --surface: #2C2C2E;
    --surface2: #3A3A3C;
    --green: #ADD144;
    --green-dim: rgba(173,209,68,0.15);
    --red: #EA523E;
    --text: #F5F5F7;
    --text-muted: #8E8E93;
    --border: rgba(255,255,255,0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header-logo span { color: var(--green); }
  .header-badge {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(173,209,68,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── SETUP PANEL ── */
  .setup-panel {
    max-width: 700px;
    margin: 40px auto 0;
    padding: 0 24px;
  }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
  }
  .setup-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
  }
  .setup-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .field-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
  }
  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--green); }
  select option { background: var(--surface2); }

  .btn-start {
    width: 100%;
    margin-top: 8px;
    background: var(--green);
    color: #111;
    border: none;
    border-radius: 8px;
    padding: 13px 20px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-start:hover { opacity: 0.9; }
  .btn-start:active { transform: scale(0.99); }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 99px;
    height: 4px;
    margin-top: 20px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── MAIN CONTAINER ── */
  .main {
    max-width: 1100px;
    margin: 32px auto;
    padding: 0 24px;
    display: none;
  }

  /* ── STRING CARD ── */
  .string-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .string-card.done { border-color: rgba(173,209,68,0.4); }
  .string-card.skipped { border-color: rgba(255,255,255,0.04); opacity: 0.55; }

  .card-inner {
    display: grid;
    grid-template-columns: 260px 1fr auto;
    align-items: center;
    gap: 0;
  }

  .col-key {
    padding: 16px 20px;
    border-right: 1px solid var(--border);
  }
  .key-name {
    font-size: 11px;
    font-family: 'Courier New', monospace;
    color: var(--green);
    word-break: break-all;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .key-english {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .col-input {
    padding: 14px 20px;
  }
  .col-input input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    padding: 8px 0;
    font-size: 15px;
    width: 100%;
  }
  .col-input input:focus { border-bottom-color: var(--green); }
  .col-input input::placeholder { color: var(--text-muted); font-style: italic; }

  .col-action {
    padding: 14px 20px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .btn-skip {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-skip:hover { border-color: var(--text-muted); color: var(--text); }

  .check-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--green-dim);
    border: 1px solid rgba(173,209,68,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check-icon svg { display: block; }

  /* ── SUBMIT BAR ── */
  .submit-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(28,28,30,0.96);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 16px 32px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    z-index: 200;
  }
  .submit-info {
    font-size: 14px;
    color: var(--text-muted);
  }
  .submit-info strong { color: var(--text); }
  .btn-submit {
    background: var(--green);
    color: #111;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.4; cursor: default; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 10px 20px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(173,209,68,0.4); color: var(--green); }
  .toast.error { border-color: rgba(234,82,62,0.4); color: var(--red); }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--text-muted);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--green-dim);
    border-color: rgba(173,209,68,0.4);
    color: var(--green);
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 7px 16px;
    font-size: 13px;
  }

  .section-spacer { height: 80px; }

  @media (max-width: 640px) {
    .card-inner { grid-template-columns: 1fr; }
    .col-key { border-right: none; border-bottom: 1px solid var(--border); }
    .setup-row { grid-template-columns: 1fr; }
    .header { padding: 14px 16px; }
  }
</style>
</head>

<div class="header">
  <div class="header-logo">
    🎣 Catch<span>Clicker</span>
  </div>
  <div class="header-badge">Translation Tool</div>
</div>

<!-- SETUP -->
<div class="setup-panel" id="setupPanel">

    <div class="setup-title">Translator Setup</div>
    <div class="setup-row">
      <div>
        <div class="field-label">Your Name</div>
        <input type="text" id="translatorName" placeholder="e.g. Giorgi M." autocomplete="name">
      </div>
      <div>
        <div class="field-label">Target Language</div>
        <select id="targetLang">
          <option value="">— Select language —</option>
          <option value="Georgian">Georgian (ქართული)</option>
          <option value="German">German (Deutsch)</option>
          <option value="French">French (Français)</option>
          <option value="Spanish">Spanish (Español)</option>
          <option value="Italian">Italian (Italiano)</option>
          <option value="Polish">Polish (Polski)</option>
          <option value="Russian">Russian (Русский)</option>
          <option value="Turkish">Turkish (Türkçe)</option>
          <option value="Dutch">Dutch (Nederlands)</option>
          <option value="Portuguese">Portuguese (Português)</option>
          <option value="Czech">Czech (Čeština)</option>
          <option value="Hungarian">Hungarian (Magyar)</option>
          <option value="Romanian">Romanian (Română)</option>
          <option value="Swedish">Swedish (Svenska)</option>
        </select>
      </div>
    </div>
    <button class="btn-start" onclick="startTranslating()">Start Translating →</button>
  </div>
</div>

<!-- MAIN AREA -->
<div class="main" id="mainArea">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All (<span id="countAll">0</span>)</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending (<span id="countPending">0</span>)</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done (<span id="countDone">0</span>)</button>
    <input class="search-input" type="text" id="searchInput" placeholder="Search keys or text…" oninput="renderCards()">
  </div>

  <div id="cardsContainer"></div>
  <div class="section-spacer"></div>
</div>

<!-- SUBMIT BAR -->
<div class="submit-bar" id="submitBar">
  <div class="submit-info">
    <strong id="doneCount">0</strong> translated &nbsp;·&nbsp; <span id="pendingCount">0</span> remaining
  </div>
  <button class="btn-submit" id="submitBtn" onclick="submitAll()">Submit to Google Sheets</button>
</div>

<div class="toast" id="toast"></div>

// ── CONFIG ── შეცვალე შენი Apps Script URL-ით
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5OUlabH05ToSuf2ZrL2XbfE1Ejq5YqquzcwORog8M_nfgndu-arFq45nFJ4xn__MKkw/exec";

// ── STATE ──
const state = { translations: {}, skipped: new Set(), filter: 'all' };
let cfg = {};

function startTranslating() {
  const name = document.getElementById('translatorName').value.trim();
  const lang = document.getElementById('targetLang').value;
  if (!name) return showToast('Enter your name', 'error');
  if (!lang) return showToast('Select a language', 'error');
  cfg = { name, lang, url: APPS_SCRIPT_URL };
  document.getElementById('setupPanel').style.display = 'none';
  document.getElementById('mainArea').style.display = 'block';
  document.getElementById('submitBar').style.display = 'flex';
  renderCards();
  updateCounts();
}

function setFilter(f, btn) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  STRINGS.forEach(s => {
    const isDone    = !!state.translations[s.key];
    const isSkipped = state.skipped.has(s.key);
    if (state.filter === 'done'    && !isDone)    return;
    if (state.filter === 'pending' && isDone)     return;
    if (search && !s.key.includes(search) && !s.en.toLowerCase().includes(search)) return;

    const card = document.createElement('div');
    card.className = `string-card${isDone ? ' done' : ''}${isSkipped ? ' skipped' : ''}`;
    card.dataset.key = s.key;

    card.innerHTML = `
      <div class="card-inner">
        <div class="col-key">
          <div class="key-name">${s.key}</div>
          <div class="key-english">${escHtml(s.en)}</div>
        </div>
        <div class="col-input">
          <input type="text"
            placeholder="Type ${cfg.lang} translation…"
            value="${escHtml(state.translations[s.key] || '')}"
            data-key="${s.key}"
            onchange="onTranslate(this)"
            oninput="onTranslate(this)"
          >
        </div>
        <div class="col-action">
          ${isDone
            ? `<div class="check-icon"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 4" stroke="#ADD144" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
            : `<button class="btn-skip" onclick="skipKey('${s.key}')">Skip</button>`
          }
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function onTranslate(input) {
  const key = input.dataset.key;
  const val = input.value.trim();
  if (val) {
    state.translations[key] = val;
    state.skipped.delete(key);
  } else {
    delete state.translations[key];
  }
  const card = input.closest('.string-card');
  if (val) { card.classList.add('done'); card.classList.remove('skipped'); }
  else { card.classList.remove('done'); }
  updateCounts();
}

function skipKey(key) {
  state.skipped.add(key);
  delete state.translations[key];
  const card = document.querySelector(`.string-card[data-key="${key}"]`);
  if (card) card.classList.add('skipped');
  updateCounts();
}

function updateCounts() {
  const done    = Object.keys(state.translations).length;
  const total   = STRINGS.length;
  const pending = total - done - state.skipped.size;
  document.getElementById('doneCount').textContent    = done;
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('countAll').textContent     = total;
  document.getElementById('countDone').textContent    = done;
  document.getElementById('countPending').textContent = pending + state.skipped.size;

  const pct = Math.round((done / total) * 100);
  let bar = document.querySelector('.progress-bar-fill');
  if (!bar) {
    const wrap = document.createElement('div');
    wrap.className = 'progress-bar-wrap';
    wrap.style.margin = '20px 24px 0';
    wrap.innerHTML = `<div class="progress-bar-fill" style="width:0%"></div>`;
    document.querySelector('.filter-bar')?.before(wrap);
    bar = wrap.querySelector('.progress-bar-fill');
  }
  bar.style.width = pct + '%';
}

async function submitAll() {
  const entries = Object.entries(state.translations);
  if (!entries.length) return showToast('Nothing to submit yet', 'error');

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  const rows = entries.map(([key, translation]) => ({
    key,
    english: STRINGS.find(s => s.key === key)?.en || '',
    language: cfg.lang,
    translation,
    translator: cfg.name,
    timestamp: new Date().toISOString()
  }));

  try {
    await fetch(cfg.url, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows })
    });
    showToast(`✓ ${rows.length} translations submitted!`, 'success');
    btn.textContent = 'Submitted ✓';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Submit to Google Sheets'; }, 3000);
  } catch(e) {
    showToast('Submit failed. Check the URL.', 'error');
    btn.disabled = false;
    btn.textContent = 'Submit to Google Sheets';
  }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
