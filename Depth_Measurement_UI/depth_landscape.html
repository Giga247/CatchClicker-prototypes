<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CatchClicker - Depth Mode (Landscape)</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="depth_landscape.css">
</head>
<body>
<div class="device-shell device-landscape">
<div class="phone" id="phone">
  <aside class="control-rail" aria-label="Measurement controls">
    <div class="top-actions">
      <button class="hit back-hit" aria-label="Back" onclick="handleBack()"></button>
      <button class="hit connect-hit" id="cbtn" onclick="toggleConnect()" aria-label="Connection status">
        <span id="clbl">Connect</span>
      </button>
      <button class="hit page-save-hit" id="page-save" onclick="saveSession()" aria-label="Save chart"></button>
    </div>

    <section class="meta-panel">
      <label class="title-hit">
        <textarea id="chart-name" class="ghost-input" aria-label="Chart name">Depth Chart Title</textarea>
      </label>
      <div class="meta-status-row">
        <span class="cloud-item"><i></i>Cloud</span>
        <span class="device-item"><i></i>Device</span>
      </div>
      <span class="meta-menu-dots">•••</span>
      <span class="meta-check"></span>
      <span class="date-glyph"></span>
      <span class="location-glyph"></span>
      <label class="date-hit">
        <input id="chart-time" class="ghost-input" type="text" value="10 September, 2024" aria-label="Chart date">
      </label>
      <label class="location-hit">
        <textarea id="chart-location" class="ghost-input" aria-label="Location">Tsalka, Georgia</textarea>
      </label>
    </section>

    <section class="measure-live">
      <div class="measure-top">
        <label class="distance-field">
          <span>Distance [m]</span>
          <input class="dinp" id="din" type="text" value="50" inputmode="numeric" pattern="[0-9]*" maxlength="3">
          <span class="dist-step-col">
            <button class="dist-step" type="button" onclick="adjustDistance(2)" aria-label="Increase distance by 2">+</button>
            <button class="dist-step" type="button" onclick="adjustDistance(-2)" aria-label="Decrease distance by 2">-</button>
          </span>
        </label>
        <button class="save-btn" id="bsave" onclick="plotPoint()">Save</button>
      </div>
      <div class="timer-face" id="seg-disp">00:00:00</div>
      <div class="sub-row" id="sub-row"></div>
      <button id="btoggle" class="btn-main btn-toggle btn-start" onclick="toggleSW()">
        <span id="toggle-label">Start</span>
      </button>
    </section>
  </aside>

  <main class="chart-pane">
    <section class="chart-live" id="cw" aria-label="Interactive chart">
      <div class="plot-frame" id="plot-frame">
        <canvas id="c"></canvas>
      </div>
      <div class="chart-legend is-hidden" id="chart-legend" aria-hidden="true">
        <button class="legend-color" type="button" data-color="green" onclick="applySelectedColor('green')" aria-label="Set selected points green">
          <i class="grass-dot"></i>
        </button>
        <input class="legend-label" id="legend-green" type="text" value="Grass" aria-label="Green legend label">
        <button class="legend-color" type="button" data-color="red" onclick="applySelectedColor('red')" aria-label="Set selected points red">
          <i class="clear-dot"></i>
        </button>
        <input class="legend-label" id="legend-red" type="text" value="Clear" aria-label="Red legend label">
      </div>
      <div class="chart-controls">
        <div class="y-mode" aria-label="Y axis scale controls">
          <button class="ymb active" data-mode="auto" onclick="setYAxisMode('auto',this)">Auto</button>
          <button class="ymb" data-mode="equal" onclick="setYAxisMode('equal',this)">X=Y</button>
        </div>
        <button class="points-pill" id="lw" onclick="toggleList()" aria-label="Open measurements">
          <span id="lb">Points: 0</span>
          <span id="la" aria-hidden="true"></span>
        </button>
        <button class="round-tool" id="bundo" onclick="undoLast()" aria-label="Undo">z</button>
        <button class="round-tool" id="bredo" onclick="redoLast()" aria-label="Redo">r</button>
      </div>
      <span class="chart-pts" id="pc">0 pts</span>
    </section>
  </main>
</div>
</div>

<div class="table-modal" id="table-modal" aria-hidden="true">
  <div class="table-modal-backdrop" onclick="closeTableModal()"></div>
  <div class="table-modal-sheet" role="dialog" aria-modal="true" aria-label="Measurements table">
    <div class="table-modal-head">
      <div class="table-modal-title">Measurements</div>
      <div class="table-modal-actions">
        <span class="chart-pts" id="modal-count">0 pts</span>
        <button class="bclr" onclick="clearAll(event)">Clear</button>
        <button class="b-undo" onclick="closeTableModal()" aria-label="Close">x</button>
      </div>
    </div>
    <div class="lcols"><span class="ch">#</span><span class="ch">Dist</span><span class="ch">Sink</span><span></span></div>
    <div class="table-modal-body" id="lr-modal"></div>
  </div>
</div>

<script src="depth_landscape.js"></script>
</body>
</html>
